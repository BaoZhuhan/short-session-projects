<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Short Session Projects</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: 'Courier New', 'Consolas', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    h1 {
      font-size: 32px;
      letter-spacing: 4px;
      color: #fff;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #666;
      margin-bottom: 40px;
      font-size: 14px;
    }
    .project-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
      max-width: 400px;
    }
    .project-card {
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 20px 24px;
      text-decoration: none;
      color: #e0e0e0;
      transition: border-color 0.2s, background 0.2s;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .project-card:hover {
      border-color: #f0a000;
      background: #181818;
    }
    .project-name {
      font-size: 18px;
      font-weight: bold;
      color: #fff;
    }
    .project-desc {
      font-size: 12px;
      color: #666;
      margin-top: 4px;
    }
    .arrow {
      color: #555;
      font-size: 20px;
    }
    .project-card:hover .arrow {
      color: #f0a000;
    }
  </style>
</head>
<body>
  <h1>SHORT SESSION PROJECTS</h1>
  <p class="subtitle">小项目合集</p>
  <div class="project-list">
    <a class="project-card" href="tetris/">
      <div>
        <div class="project-name">Tetris</div>
        <div class="project-desc">俄罗斯方块 · Canvas 2D 网页游戏</div>
      </div>
      <span class="arrow">→</span>
    </a>
  </div>
</body>
</html>
